<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>محرر ومعاين الأكواد المتقدم | HTML.com.ly</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230066FF' stroke='black' stroke-width='8'/><text x='50%' y='52%' dominant-baseline='middle' text-anchor='middle' font-family='monospace' font-weight='900' font-size='50' fill='white'>&lt;/&gt;</text></svg>">
    
    <!-- Web App Manifest for PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0066FF">

    <!-- CSS / Fonts / Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Cairo:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- CodeMirror (Editor Engine) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/neo.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

    <!-- Utilities -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.7/beautify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.7/beautify-html.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
      :root {
        --accent: #0066FF;
        --border-color: #000000;
      }
      body {
        font-family: 'Cairo', 'Space Grotesk', sans-serif;
        background-color: #ffffff;
      }
      .brutal-border {
        border: 3px solid var(--border-color);
      }
      .brutal-shadow {
        box-shadow: 4px 4px 0px 0px var(--border-color);
        transition: all 0.15s ease;
      }
      .brutal-shadow:hover {
        transform: translate(-1px, -1px);
        box-shadow: 6px 6px 0px 0px var(--border-color);
      }
      .CodeMirror {
        height: calc(100% - 32px);
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        background: #fdfdfd !important;
      }
      #notification-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .brutal-notification {
        min-width: 300px;
        padding: 16px;
        border: 3px solid #000;
        background: #4ade80;
        font-weight: 800;
        box-shadow: 5px 5px 0px 0px #000;
        display: flex;
        align-items: center;
        gap: 12px;
      }
    </style>
  </head>
  <body class="h-screen flex flex-col overflow-hidden">

    <!-- Notification Container -->
    <div id="notification-container"></div>

    <!-- Header -->
    <header class="h-16 brutal-border border-b-4 flex items-center justify-between px-6 bg-white z-20">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-[#0066FF] brutal-border flex items-center justify-center text-white font-black text-xl brutal-shadow">
          &lt;/&gt;
        </div>
        <h1 class="text-2xl font-black tracking-tighter">HTML<span class="text-[#0066FF]">.com.ly</span></h1>
      </div>

      <div class="flex items-center gap-3">
        <button onclick="toggleTailwind()" id="tailwind-btn" class="brutal-border bg-white px-3 py-1.5 text-xs font-black hover:bg-yellow-100 brutal-shadow transition-all flex items-center gap-1">
          <i class="ph ph-wind text-lg"></i> <span>مكتبة Tailwind: ملغاة</span>
        </button>
        <button onclick="formatCode()" class="bg-[#0066FF] text-white brutal-border px-4 py-1.5 text-sm font-black brutal-shadow hover:bg-blue-600 flex items-center gap-2">
          <i class="ph ph-magic-wand"></i> تنسيق الكود
        </button>
      </div>
    </header>

    <!-- Workspace -->
    <main class="flex-grow flex flex-col md:flex-row overflow-hidden bg-gray-50">
      
      <!-- Editor -->
      <section class="flex-1 flex flex-col brutal-border border-t-0 border-b-0 border-l-2 relative">
        <div class="bg-[#0066FF] text-white border-b-4 border-black px-4 py-2 flex justify-between items-center text-xs font-black tracking-widest">
          <span><i class="ph ph-code-block mr-1"></i> ساحة كتابة الأكواد</span>
          <span class="bg-black text-white px-2 py-0.5 rounded">AUTO-SAVE</span>
        </div>
        <div class="flex-grow relative h-full">
          <textarea id="code-editor"></textarea>
        </div>
      </section>

      <!-- Preview -->
      <section class="flex-1 flex flex-col brutal-border border-t-0 border-b-0 border-r-2 bg-white">
        <div class="bg-yellow-400 text-black border-b-4 border-black px-4 py-2 flex justify-between items-center text-xs font-black tracking-widest">
          <span><i class="ph ph-eye mr-1"></i> المعاينة المباشرة الفورية</span>
          <div class="flex gap-2">
            <button onclick="copyCode()" class="hover:underline flex items-center gap-1"><i class="ph ph-copy"></i> نسخ</button>
            <button onclick="downloadCode()" class="hover:underline flex items-center gap-1"><i class="ph ph-download"></i> تحميل</button>
          </div>
        </div>
        <div class="flex-grow relative p-4 bg-gray-100 flex justify-center items-center">
          <iframe id="preview-frame" class="w-full h-full border-4 border-black bg-white brutal-shadow" sandbox="allow-scripts allow-modals allow-forms allow-same-origin" title="Output"></iframe>
        </div>
      </section>

    </main>

    <footer class="bg-black text-white py-1 px-4 text-xs font-mono text-center">
      جميع الحقوق محفوظة © 2026 HTML.com.ly - منصة معاينة الأكواد المتقدمة
    </footer>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker Registered Successfully!', reg))
            .catch(err => console.error('Service Worker Registration Failed!', err));
        });
      }
    </script>

    <!-- Core App Logic -->
    <script>
      let editor;
      let isTailwindActive = false;

      document.addEventListener('DOMContentLoaded', () => {
        editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
          mode: 'htmlmixed',
          theme: 'neo',
          lineNumbers: true,
          autoCloseTags: true,
          autoCloseBrackets: true,
          matchBrackets: true,
          lineWrapping: true,
          tabSize: 2
        });

        // Load Default Sample
        editor.setValue(`<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>مرحباً بك في HTML.com.ly</title>
  <style>
    body {
      background: #f0f0f0;
      font-family: 'Cairo', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 90vh;
    }
    .box {
      background: #fff;
      border: 4px solid #000;
      box-shadow: 8px 8px 0 #0066FF;
      padding: 30px;
      text-align: center;
    }
    h1 { color: #0066FF; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>مرحباً سيف! 🚀</h1>
    <p>تم تحويل HTML.com.ly بنجاح إلى هيكلية PWA متكاملة من 7 ملفات.</p>
  </div>
</body>
</html>`);

        editor.on('change', () => {
          updatePreview();
        });

        updatePreview();
      });

      function updatePreview() {
        const frame = document.getElementById('preview-frame');
        let code = editor.getValue();
        if (isTailwindActive && !code.includes('cdn.tailwindcss.com')) {
          const tailwindScript = '<script src="https://cdn.tailwindcss.com"><\/script>';
          code = code.replace('<head>', '<head>' + tailwindScript);
        }
        const frameDoc = frame.contentWindow.document;
        frameDoc.open();
        frameDoc.write(code);
        frameDoc.close();
      }

      function formatCode() {
        const raw = editor.getValue();
        const formatted = html_beautify(raw, { indent_size: 2, wrap_line_length: 80 });
        editor.setValue(formatted);
        showNotification("تم تنسيق وتجميل كود HTML بنجاح!");
      }

      function toggleTailwind() {
        isTailwindActive = !isTailwindActive;
        const btn = document.getElementById('tailwind-btn');
        btn.querySelector('span').innerText = isTailwindActive ? "مكتبة Tailwind: نشطة" : "مكتبة Tailwind: ملغاة";
        btn.classList.toggle('bg-teal-300');
        updatePreview();
      }

      function copyCode() {
        navigator.clipboard.writeText(editor.getValue()).then(() => {
          showNotification("تم نسخ الكود بنجاح!");
        });
      }

      function downloadCode() {
        const blob = new Blob([editor.getValue()], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'index.html';
        a.click();
      }

      function showNotification(message) {
        const container = document.getElementById('notification-container');
        const notif = document.createElement('div');
        notif.className = 'brutal-notification';
        notif.innerHTML = `<i class="ph ph-check-circle text-2xl"></i> <span>${message}</span>`;
        container.appendChild(notif);
        setTimeout(() => notif.remove(), 3000);
      }
    </script>
  </body>
</html>
